  <rect x="94" y="150" width="112" height="48" rx="10" fill="#ff6c37"/>
  <text x="124" y="181" fill="#ffffff" font-family="Arial, sans-serif" font-size="17" font-weight="700">POST</text>
  <rect x="220" y="150" width="886" height="48" rx="10" fill="#061725"/>
