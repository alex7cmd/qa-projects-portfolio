  <g font-family="Arial, sans-serif">
    <text x="430" y="192" fill="#ffffff" font-size="34" font-weight="700">Flujo validado en dispositivo móvil</text>
    <text x="430" y="251" fill="#9db3bf" font-size="17">• Diseño y ejecución de escenarios positivos y negativos</text>
    <text x="430" y="293" fill="#9db3bf" font-size="17">• Validación de mensajes, estados y navegación</text>
    <text x="430" y="335" fill="#9db3bf" font-size="17">• Registro de evidencia y comportamiento observado</text>
  </g>
  <rect x="430" y="407" width="650" height="105" rx="12" fill="#c9f3e8" fill-opacity=".08"/>
  <text x="460" y="452" fill="#c9f3e8" font-family="Arial, sans-serif" font-size="18" font-weight="700">Resultado</text>
  <text x="460" y="484" fill="#9db3bf" font-family="Arial, sans-serif" font-size="15">Placeholder: reemplazar por captura o video corto del flujo real.</text>
