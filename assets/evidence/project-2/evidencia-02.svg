<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Reporte de defecto en JIRA</title>
  <desc id="desc">Marcador visual para reemplazar por una captura real de un defecto documentado.</desc>
  <rect width="1200" height="675" fill="#061725"/>
  <rect x="54" y="54" width="1092" height="567" rx="28" fill="#f7fafb"/>
  <rect x="54" y="54" width="1092" height="82" rx="28" fill="#0b2638"/>
  <rect x="54" y="108" width="1092" height="28" fill="#0b2638"/>
  <text x="94" y="106" fill="#c9f3e8" font-family="Arial, sans-serif" font-size="21" font-weight="700">JIRA / BUG-127</text>
  <text x="94" y="190" fill="#0b2638" font-family="Arial, sans-serif" font-size="34" font-weight="700">El botón Confirmar no responde</text>
  <rect x="94" y="224" width="138" height="38" rx="19" fill="#ffe2df"/>
  <text x="123" y="249" fill="#a8322b" font-family="Arial, sans-serif" font-size="14" font-weight="700">PRIORIDAD ALTA</text>
  <g fill="#435968" font-family="Arial, sans-serif" font-size="16">
    <text x="94" y="312" font-weight="700">Pasos para reproducir</text>
    <text x="112" y="346">1. Abrir el flujo de solicitud</text><text x="112" y="378">2. Completar los campos requeridos</text><text x="112" y="410">3. Seleccionar Confirmar</text>
    <text x="650" y="312" font-weight="700">Resultado actual</text><text x="650" y="346">La interfaz no muestra respuesta</text>
    <text x="650" y="410" font-weight="700">Resultado esperado</text><text x="650" y="444">La solicitud se guarda correctamente</text>
  </g>
  <rect x="94" y="493" width="1012" height="76" rx="12" fill="#e8f5f2"/>
  <text x="122" y="538" fill="#435968" font-family="Arial, sans-serif" font-size="16">Placeholder: sustituir por un ticket anonimizado con evidencia adjunta.</text>
</svg>
